<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bugatti Royale 1930</title>
    <link rel="stylesheet" href="assets/css/game.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="gameIntro">
        <div>
            <h1>Rue du Sauvage - Août 1944</h1>
            <p>Lors de la Libération, les Alliés bombardèrent Mulhouse en visant les tramways de la rue du Sauvage, mais
                à
                la suite d'imprécisions, beaucoup de civils perdirent la vie.
            </p>
        </div>
        <button class="gameIntroBtn">JOUER</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div class="buggatiroyale">
        <img class="buggatiroyale_wheel" src="assets/img/steeringwheel.png" alt="Steering Wheel">
        <img class="buggatiroyale_dash" src="assets/img/dashboard.png" alt="Dashboard">
    </div>

    <script src="assets/js/steering.js"></script>
</body>

</html>
